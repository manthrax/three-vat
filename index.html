<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL2 Houdini VAT2 & VAT3 - Demo</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #070605 0%, #100d0a 100%);
      --accent-color: #d97706;
      /* Amber */
      --accent-glow: rgba(217, 119, 6, 0.25);
      --panel-bg: rgba(12, 10, 8, 0.85);
      --panel-border: transparent;
      --text-color: #fef3c7;
      /* Warm gold/off-white */
      --text-muted: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* UI Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .interactive {
      pointer-events: auto;
    }

    /* Minimal Borderless Panel */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4px;
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(217, 119, 6, 0.08);
      transition: all 0.2s ease;
    }

    .header-panel {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-start;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    h1 span {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--accent-color);
      color: #000;
      padding: 1px 4px;
      border-radius: 2px;
    }

    /* Bottom Control Panel */
    .controls-panel {
      width: 480px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .toggle-panel {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      width: 130px;
      border-radius: 4px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="range"],
    button {
      background: rgba(255, 255, 255, 0.04);
      border: none;
      border-radius: 3px;
      color: var(--text-color);
      padding: 6px 10px;
      font-size: 11px;
      outline: none;
      transition: all 0.2s;
    }

    button {
      background: var(--accent-color);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--accent-glow);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #fbbf24;
      transform: translateY(-0.5px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Playback controls row */
    .playback-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .speed-display,
    .instances-display {
      text-align: right;
      font-size: 9px;
      color: var(--text-color);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    /* Range slider customizations */
    input[type="range"] {
      -webkit-appearance: none;
      padding: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 4px var(--accent-glow);
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    /* Loading overlay */
    #loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 7, 6, 0.9);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: opacity 0.5s ease;
      backdrop-filter: blur(8px);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Floating labels above 3D models */
    .floating-label {
      position: absolute;
      z-index: 5;
      transform: translate(-50%, -100%);
      background: rgba(10, 8, 6, 0.85);
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fbbf24;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.1s ease;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- Import Map for Modern ES Modules -->
  <!--script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.185.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.185.0/examples/jsm/"
      }
    }
  </script-->
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
    <div id="loading-text">Loading Houdini VAT Assets...</div>
  </div>

  <div id="canvas-container"></div>

  <!-- Floating Labels Container -->
  <div id="labels-container"
    style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5;"></div>

  <div class="overlay">
    <!-- Header -->
    <div class="glass-panel header-panel interactive">
      <h1><a href="https://github.com/manthrax/three-vat" target="_blank" rel="noopener"
          style="color: inherit; text-decoration: none; transition: text-shadow 0.2s;"
          onmouseover="this.style.textShadow='0 0 12px rgba(217,119,6,0.7)'"
          onmouseout="this.style.textShadow=''">THREE-VAT : Houdini VAT loader for Threejs</a><span>VAT2 &amp;
          VAT3</span></h1>
      <div style="font-size: 8px; font-weight: 600; color: #705510; text-transform: uppercase; letter-spacing: 0.5px;">
        Softbody &bull; Particles &bull; Rigidbody &bull; Fluid</div>
    </div>

    <!-- Toggle Panel (Right side) -->
    <div class="glass-panel toggle-panel interactive" id="toggle-panel">
      <div
        style="font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; padding-bottom: 2px;">
        Toggle Demos</div>
    </div>

    <!-- Controls Panel (Centered at bottom) -->
    <div class="glass-panel controls-panel interactive">
      <!-- Play/Pause & Reset -->
      <div class="control-group" style="max-width: 100px;">
        <label>Playback</label>
        <div class="playback-row">
          <button id="play-btn">Pause</button>
          <button id="reset-btn"
            style="background: rgba(255,255,255,0.05); color: #fff; box-shadow: none;">Reset</button>
        </div>
      </div>

      <!-- Playback Speed -->
      <div class="control-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label for="speed-range">Speed</label>
          <span class="speed-display" id="speed-val">1.000x</span>
        </div>
        <input type="range" id="speed-range" min="0" max="2.0" step="0.005" value="1">
      </div>

      <!-- Dynamic Instances -->
      <div class="control-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label for="instances-range">Instances</label>
          <span class="instances-display" id="instances-val">5</span>
        </div>
        <input type="range" id="instances-range" min="1" max="100" step="1" value="5">
      </div>

      <!-- Helpers Toggle -->
      <div class="control-group" style="align-items: center; justify-content: center; max-width: 45px;">
        <label for="grid-toggle" style="cursor: pointer; margin-bottom: 2px;">Grid</label>
        <input type="checkbox" id="grid-toggle" checked
          style="width: 12px; height: 12px; cursor: pointer; accent-color: var(--accent-color);">
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { HDRLoader } from 'three/examples/jsm/loaders/HDRLoader.js';
    //import { PMREMGenerator } from 'three/examples/jsm/pmrem/PMREMGenerator.js';
    //import { PMREMCubeUVPacker } from 'three/examples/jsm/pmrem/PMREMCubeUVPacker.js';

    import { VATLoader } from './VATLoader.js';
    import { VATEffect } from './VATEffect.js';

    let container, scene, camera, renderer, controls;
    let vats = [];
    let gridHelper;
    let clock = new THREE.Timer();
    clock.connect(document);
    let isPlaying = true;
    let playSpeed = 1.0;
    let currentInstances = 5;

    const loaderEl = document.getElementById('loader');
    const loadingTextEl = document.getElementById('loading-text');
    const labelsContainer = document.getElementById('labels-container');

    const config = [
      { name: 'demo_cloth', label: 'Demo Cloth', posX: -12.0, posY: 1 },
      { name: 'vat3_softBody', label: 'Softbody', posX: -8.0 },
      { name: 'demo_fluid', label: 'Demo Fluid', posX: -4.0, posY: .7 },
      { name: 'vat3_dynamicMesh', label: 'Dynamic Mesh', posX: 0.0, posY: .5 },
      { name: 'exp_fluid', label: 'Exported Fluid', posX: 4.0, posY: .7, scale: 1},
      { name: 'vat3_particles', label: 'Particles', posX: 8.0, posY: 1, scale: 0.1 },
      { name: 'vat3_rigidBody', label: 'Rigidbody', posX: 12.0 },
      { name: 'demo_rigid_body', label: 'Demo Rigidbody', posX: 16.0 }
    ];

    async function init() {
      // Container
      container = document.getElementById('canvas-container');

      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x07080e);
      //cene.fog = new THREE.FogExp2(0x07080e, 0.02);

      // Camera
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 17);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFShadowMap;
      container.appendChild(renderer.domElement);

      // Env map
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      new HDRLoader()
        //.setPath('')
        .load('./examples/boiler_room_2k.hdr',
          function (texture) {
            var envMap = pmremGenerator.fromEquirectangular(texture).texture;
            scene.background = envMap;
            scene.environment = envMap;
            scene.backgroundBlurriness = .1;
            texture.dispose();
            pmremGenerator.dispose();
            window.dispatchEvent(new CustomEvent('env-loaded', { detail: envMap }));
          })



      // Controls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 + 0.1;
      controls.target.set(0, 0, 0);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x111322, 0.8);
      hemisphereLight.position.set(0, 20, 0);
      scene.add(hemisphereLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(5, 15, 8);
      dirLight.castShadow = true;
      dirLight.shadow.camera.left = -15;
      dirLight.shadow.camera.right = 15;
      dirLight.shadow.camera.top = 15;
      dirLight.shadow.camera.bottom = -15;


      dirLight.shadow.mapSize.width = 2048;
      dirLight.shadow.mapSize.height = 2048;
      dirLight.shadow.bias = -0.0001;
      scene.add(dirLight);

      let css2threecolor = (cssv) => new THREE.Color(cssv.slice(0, -2))
      // Floor grid helper

      gridHelper = new THREE.GridHelper(40, 40, "#1b2236", '#1c1e10');
      //gridHelper.position.y = -1.0;
      scene.add(gridHelper);

      let plane = new THREE.Mesh(new THREE.PlaneGeometry(50, 250), new THREE.MeshStandardMaterial({
        color: '#222',
        transparent: true,
        opacity: .7
      }));
      plane.geometry.rotateX(-Math.PI * .5)
      plane.receiveShadow = true
      //plane.position.y -= 1;
      scene.add(plane)

      // UI Listeners
      const playBtn = document.getElementById('play-btn');
      playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playBtn.innerText = isPlaying ? 'Pause' : 'Play';
        vats.forEach(item => item.vat.setEnabled(isPlaying));
      });

      document.getElementById('reset-btn').addEventListener('click', () => {
        clock = new THREE.Timer();
        clock.connect(document)
        vats.forEach(item => {
          item.vat.time = 0;
        });
      });

      const speedRange = document.getElementById('speed-range');
      const speedVal = document.getElementById('speed-val');
      speedRange.addEventListener('input', (e) => {
        playSpeed = parseFloat(e.target.value);
        speedVal.innerText = playSpeed.toFixed(3) + 'x';

        vats.forEach(item => {
          item.vat.speed = playSpeed;
        });
      });

      const instancesRange = document.getElementById('instances-range');
      const instancesVal = document.getElementById('instances-val');
      instancesRange.addEventListener('input', (e) => {
        currentInstances = parseInt(e.target.value);
        instancesVal.innerText = currentInstances;
        vats.forEach(item => {
          if (item.vat.mesh && item.vat.mesh.isInstancedMesh) {
            item.vat.mesh.count = currentInstances;
          }
        });
      });

      document.getElementById('grid-toggle').addEventListener('change', (e) => {
        gridHelper.visible = e.target.checked;
      });

      // Window resize
      window.addEventListener('resize', onWindowResize);

      // Load all simulations in parallel
      await loadAllVats();

      // Start loop
      renderer.setAnimationLoop(animate);
    }

    const data = new Uint8Array([255, 255, 255, 255, 128, 128, 128, 255, 128, 128, 128, 255, 255, 255, 255, 255]); // grey
    const defaultTexture = new THREE.DataTexture(data, 2, 2, THREE.RGBAFormat);
    defaultTexture.needsUpdate = true;
    defaultTexture.repeat.set(10, 10)
    defaultTexture.wrapS = defaultTexture.wrapT = THREE.RepeatWrapping;
    let matDefaults = {
      roughness: 0.05,
      metalness: 0.6,
      color: 'white',
      map: defaultTexture,
      //transparent: true,
      //opacity: .5,
    }


    let defaultMat = new THREE.MeshStandardMaterial(matDefaults);
    async function loadAllVats() {
      loaderEl.style.opacity = '1';
      loaderEl.style.pointerEvents = 'auto';

      const loadPromises = config.map(async (cfg) => {
        loadingTextEl.innerText = `Loading ${cfg.label}...`;
        const loadOptions = { isOpenVat: Boolean(cfg.isOpenVat) };
        const assets = await VATLoader.load('examples/', cfg.name, loadOptions);

        let options = { camera };

        // 1. Resolve material overrides
        let material = Array.isArray(assets.mesh.material) ? assets.mesh.material[0] : assets.mesh.material;

        if (cfg.name === 'vat3_particles') {
          try {
            const textureUrl = `examples/vat3_particles/vat3_particles_col.png`;
            const albedo = await new THREE.TextureLoader().loadAsync(textureUrl);
            material = defaultMat.clone();
            material.map = albedo;
            options.albedoTexture = albedo;
          } catch (e) {
            console.warn('vat3_particles: albedo texture failed to load', e);
            material = defaultMat.clone();
          }
        } else if (cfg.name === 'vat3_softBody') {
          try {
            const textureUrl = `examples/vat3_softBody/flag_banner_red.jpg`;
            const albedo = await new THREE.TextureLoader().loadAsync(textureUrl);
            material = defaultMat.clone();
            material.map = albedo;
            options.albedoTexture = albedo;
          } catch (e) {
            console.warn('vat3_softBody: albedo texture failed to load', e);
            material = defaultMat.clone()
          }
        } else if (cfg.name === 'demo_fluid' || cfg.name === 'exp_fluid') {
          material = defaultMat.clone()
          material.map = null;

        } else if (cfg.name === 'demo_rigid_body') {
          material = defaultMat.clone()
        } else if (cfg.name === 'vat3_dynamicMesh') {

          //material.map = null;
        } else {
          // Clone to avoid sharing material settings across instances of other classes
          material = defaultMat.clone();
        }

        // 2. Create InstancedMesh with 100 instances (max capacity) extending in negative Z
        const count = 100;
        const instancedMesh = new THREE.InstancedMesh(assets.mesh.geometry, material, count);

        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        for (let j = 0; j < count; j++) {
          // Extend backward in Z
          dummy.position.set(0, 0, -j * 3.5);
          const currentScale = cfg.scale !== undefined ? cfg.scale : 1.0;
          dummy.scale.setScalar(currentScale);
          if (j) dummy.rotation.y = Math.random() * Math.PI * 2;
          dummy.updateMatrix();
          instancedMesh.setMatrixAt(j, dummy.matrix);

          // Stagger colors (j = 0 is white/standard, others are randomized)
          if (j === 0) {
            instancedMesh.setColorAt(j, new THREE.Color(0xffffff));
          } else {
            color.setHSL(Math.random(), 0.75, 0.5);
            instancedMesh.setColorAt(j, color);
          }
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        if (instancedMesh.instanceColor) {
          instancedMesh.instanceColor.needsUpdate = true;
        }
        instancedMesh.frustumCulled = false;

        // Set initial visible count
        instancedMesh.count = currentInstances;
        options.instancedMesh = instancedMesh;

        const vat = new VATEffect(assets, options);
        vat.speed = playSpeed;
        vat.setEnabled(isPlaying);

        // Stagger start times and playback speeds across all instances
        for (let j = 0; j < count; j++) {
          vat.setInstanceTimeOffset(j, j * 0.4);
          vat.setInstanceSpeedScale(j, 0.8 + Math.random() * 0.4);
        }

        // Place in row
        if (cfg.posX) vat.mesh.position.x = cfg.posX;
        if (cfg.posY) vat.mesh.position.y = cfg.posY;
        if (cfg.rotX) vat.mesh.rotation.x = cfg.rotX*Math.PI/180;

        vat.mesh.castShadow = true;
        vat.mesh.receiveShadow = true;

        let effectContainer = new THREE.Object3D();
        effectContainer.add(vat.mesh);
        scene.add(effectContainer);
        // Add HTML floating label element
        const labelDiv = document.createElement('div');
        labelDiv.className = 'floating-label';
        labelDiv.innerText = cfg.label;
        labelsContainer.appendChild(labelDiv);

        vats.push({
          name: cfg.name,
          vat,
          labelEl: labelDiv,
          posX: cfg.posX
        });
      });

      await Promise.all(loadPromises);

      // Populate demo checkboxes
      const togglePanel = document.getElementById('toggle-panel');
      config.forEach((cfg) => {
        const itemRow = document.createElement('div');
        itemRow.style.display = 'flex';
        itemRow.style.alignItems = 'center';
        itemRow.style.gap = '8px';
        itemRow.style.fontSize = '12px';
        itemRow.style.cursor = 'pointer';
        itemRow.style.margin = '4px 0';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = true;
        checkbox.id = `toggle-${cfg.name}`;
        checkbox.style.cursor = 'pointer';
        checkbox.style.accentColor = 'var(--accent-color)';

        const label = document.createElement('label');
        label.htmlFor = checkbox.id;
        label.innerText = cfg.label;
        label.style.cursor = 'pointer';
        label.style.textTransform = 'none';
        label.style.letterSpacing = 'normal';

        itemRow.appendChild(checkbox);
        itemRow.appendChild(label);
        togglePanel.appendChild(itemRow);

        checkbox.addEventListener('change', (e) => {
          const item = vats.find(v => v.name === cfg.name);
          if (item) {
            item.vat.mesh.visible = e.target.checked;
            if (item.labelEl) {
              item.labelEl.style.display = e.target.checked ? 'block' : 'none';
            }
          }
        });
      });

      // Fade out loader
      loaderEl.style.opacity = '0';
      loaderEl.style.pointerEvents = 'none';
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    const tempV = new THREE.Vector3();
    function updateFloatingLabels() {
      vats.forEach(item => {
        // Project 3D coordinate of the label below the mesh
        tempV.set(item.posX, -1.8, 0);
        tempV.project(camera);
        if (!item.labelEl) return;
        // Check if behind camera
        if (tempV.z > 1) {
          item.labelEl.style.opacity = 0;
          return;
        }

        const px = (tempV.x * 0.5 + 0.5) * window.innerWidth;
        const py = (tempV.y * -0.5 + 0.5) * window.innerHeight;

        item.labelEl.style.opacity = 1;
        item.labelEl.style.transform = `translate(-50%, -100%) translate(${px}px, ${py}px)`;
      });
    }

    function animate(timeMSec) {
      if (currentVatLoaded()) {
        clock.update(timeMSec)
        const time = clock.getElapsed();
        vats.forEach(item => {
          if (isPlaying) {
            item.vat.update(time);
          } else {
            item.vat.update(item.vat.time);
          }
        });
      }

      controls.update();
      updateFloatingLabels();
      renderer.render(scene, camera);
    }

    function currentVatLoaded() {
      return vats.length > 0;
    }

    init();
  </script>
</body>

</html>
