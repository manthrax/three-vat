<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGL2 Houdini VAT2 & VAT3 - Demo</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #070605 0%, #100d0a 100%);
      --accent-color: #d97706;
      /* Amber */
      --accent-glow: rgba(217, 119, 6, 0.25);
      --panel-bg: rgba(12, 10, 8, 0.85);
      --panel-border: transparent;
      --text-color: #fef3c7;
      /* Warm gold/off-white */
      --text-muted: #d97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* UI Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      padding: 8px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .interactive {
      pointer-events: auto;
    }

    /* Minimal Borderless Panel */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4px;
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(217, 119, 6, 0.08);
      transition: all 0.2s ease;
    }

    .header-panel {
      position: absolute;
      top: 8px;
      left: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-start;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
    }

    h1 span {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--accent-color);
      color: #000;
      padding: 1px 4px;
      border-radius: 2px;
    }

    /* Bottom Control Panel */
    .controls-panel {
      width: 480px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .toggle-panel {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      width: 130px;
      border-radius: 4px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    label {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="range"],
    button {
      background: rgba(255, 255, 255, 0.04);
      border: none;
      border-radius: 3px;
      color: var(--text-color);
      padding: 6px 10px;
      font-size: 11px;
      outline: none;
      transition: all 0.2s;
    }

    button {
      background: var(--accent-color);
      color: #000;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--accent-glow);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #fbbf24;
      transform: translateY(-0.5px);
    }

    button:active {
      transform: translateY(0);
    }

    /* Playback controls row */
    .playback-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .speed-display,
    .instances-display {
      text-align: right;
      font-size: 9px;
      color: var(--text-color);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    /* Range slider customizations */
    input[type="range"] {
      -webkit-appearance: none;
      padding: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 4px var(--accent-glow);
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    /* Loading overlay */
    #loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 7, 6, 0.9);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      transition: opacity 0.5s ease;
      backdrop-filter: blur(8px);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    #loading-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-color);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Floating labels above 3D models */
    .floating-label {
      position: absolute;
      z-index: 5;
      transform: translate(-50%, -100%);
      background: rgba(10, 8, 6, 0.85);
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fbbf24;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.1s ease;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <!-- Import Map for Modern ES Modules -->
  <!--script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.185.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.185.0/examples/jsm/"
      }
    }
  </script-->
  <script type="module" crossorigin src="/three-vat/assets/index-MrGDG2Ne.js"></script>
</head>

<body>
  <div id="loader">
    <div class="spinner"></div>
    <div id="loading-text">Loading Houdini VAT Assets...</div>
  </div>

  <div id="canvas-container"></div>

  <!-- Floating Labels Container -->
  <div id="labels-container"
    style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5;"></div>

  <div class="overlay">
    <!-- Header -->
    <div class="glass-panel header-panel interactive">
      <h1><a href="https://github.com/manthrax/three-vat" target="_blank" rel="noopener"
          style="color: inherit; text-decoration: none; transition: text-shadow 0.2s;"
          onmouseover="this.style.textShadow='0 0 12px rgba(217,119,6,0.7)'"
          onmouseout="this.style.textShadow=''">THREE-VAT : Houdini VAT loader for Threejs</a><span>VAT2 &amp;
          VAT3</span></h1>
      <div style="font-size: 8px; font-weight: 600; color: #705510; text-transform: uppercase; letter-spacing: 0.5px;">
        Softbody &bull; Particles &bull; Rigidbody &bull; Fluid</div>
    </div>

    <!-- Toggle Panel (Right side) -->
    <div class="glass-panel toggle-panel interactive" id="toggle-panel">
      <div
        style="font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; padding-bottom: 2px;">
        Toggle Demos</div>
    </div>

    <!-- Controls Panel (Centered at bottom) -->
    <div class="glass-panel controls-panel interactive">
      <!-- Play/Pause & Reset -->
      <div class="control-group" style="max-width: 100px;">
        <label>Playback</label>
        <div class="playback-row">
          <button id="play-btn">Pause</button>
          <button id="reset-btn"
            style="background: rgba(255,255,255,0.05); color: #fff; box-shadow: none;">Reset</button>
        </div>
      </div>

      <!-- Playback Speed -->
      <div class="control-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label for="speed-range">Speed</label>
          <span class="speed-display" id="speed-val">1.000x</span>
        </div>
        <input type="range" id="speed-range" min="0" max="2.0" step="0.005" value="1">
      </div>

      <!-- Dynamic Instances -->
      <div class="control-group">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label for="instances-range">Instances</label>
          <span class="instances-display" id="instances-val">5</span>
        </div>
        <input type="range" id="instances-range" min="1" max="100" step="1" value="5">
      </div>

      <!-- Helpers Toggle -->
      <div class="control-group" style="align-items: center; justify-content: center; max-width: 45px;">
        <label for="grid-toggle" style="cursor: pointer; margin-bottom: 2px;">Grid</label>
        <input type="checkbox" id="grid-toggle" checked
          style="width: 12px; height: 12px; cursor: pointer; accent-color: var(--accent-color);">
      </div>
    </div>
  </div>

</body>

</html>
